# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on: [push,pull_request]

permissions:
  contents: read

jobs:
  backend:
    name: building & testing python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout la cod
        uses: actions/checkout@v4
      - name: Set up Python 
        uses: actions/setup-python@v4
        with: 
          python-version: "3.11"
      - name: Install dependencies
        working-directory: backend
        run: | 
          python -m pip install --upgrade pip
          if [ -f dev-requirements.txt ]; then pip install -r dev-requirements.txt; fi
      - name: Compilare
        working-directory: backend
        run: |
          python -m compileall .
      - name: Lint cu Ruff
        working-directory: backend
        run: |
          pip install ruff
          ruff check .
      - name: pytest
        working-directory: backend
        run: |
          pip install pytest pytest-cov
          pytest --cov=./ --cov-report=xml --cov-fail-under=80
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/coverage.xml
      - name: boot
        working-directory: backend
        run : |
          python -m app &
          sleep 3
          curl --fail http://localhost:8000/health

  frontend:
    name: Node.js
    runs-on: ubuntu-latest

    steps:
      - name: Checkout la cod
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*' 
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit
      - name: VITest
        working-directory: frontend
        run: npx vitest run
      - name: Build
        working-directory: frontend
        run: npm run build
  
  docker:
    name: Teste in interiorul imaginii
    runs-on: ubuntu-latest
    needs: [backend,frontend]
    steps:
      - name: Checkout la cod
        uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t cluster-test .
      - name: Run pytest INSIDE the container
        run: docker run --rm cluster-test pytest
      - name: Test container boot and health endpoint
        run: |
          docker run -d -p 8000:8000 --name cluster-instance cluster-test
          sleep 3
          curl --fail http://localhost:8000/api/state
          docker rm -f cluster-instance  
